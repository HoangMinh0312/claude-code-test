name: Claude Code — Auto-fix Issue

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]

# Prevent concurrent runs for the same issue
concurrency:
  group: claude-fix-issue-${{ github.event.issue.number }}
  cancel-in-progress: false

jobs:
  auto-fix:
    name: Fix with Claude Code + Playwright
    runs-on: ubuntu-latest

    # Gate 1: issue labeled "claude" OR comment "/claude ..." from a collaborator/owner/member
    if: |
      (
        github.event_name == 'issues' &&
        github.event.label.name == 'claude'
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request == null &&
        startsWith(github.event.comment.body, '/claude') &&
        contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)
      )

    permissions:
      contents: write
      pull-requests: write
      issues: write

    env:
      DATABASE_URL: file:./dev.db

    steps:
      # ── Repo ──────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── Node + deps ───────────────────────────────────────────────────────
      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      # ── Database ──────────────────────────────────────────────────────────
      - name: Prisma — generate + migrate
        run: |
          npx prisma generate
          npx prisma migrate deploy

      # ── Playwright ────────────────────────────────────────────────────────
      - name: Install Playwright (Chromium only)
        run: npx playwright install chromium --with-deps

      # ── Dev server ────────────────────────────────────────────────────────
      - name: Start Next.js dev server (background)
        run: npm run dev > /tmp/nextjs.log 2>&1 &

      - name: Wait for http://localhost:3000
        run: npx wait-on http://localhost:3000 --timeout 90000

      # ── Claude Code ───────────────────────────────────────────────────────
      - name: Run Claude Code
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          trigger_phrase: "/claude"
          label_trigger: "claude"
          model: "claude-sonnet-4-5"
          base_branch: "main"
          branch_prefix: "fix/"
          use_sticky_comment: true
          custom_instructions: |
            You are an AI engineer working on the **uigen** Next.js 15 app.
            The app is live at http://localhost:3000 (already running — do NOT start it again).

            ## Steps to follow
            1. **Understand** — read the issue carefully.
            2. **Explore** — use Playwright to visit http://localhost:3000 and reproduce the problem. Take a screenshot.
            3. **Diagnose** — trace the root cause through the source files (`src/`).
            4. **Fix** — edit only what is necessary; no unrelated refactors.
            5. **Verify** — use Playwright again to confirm the issue is resolved.
            6. **PR** — commit your changes and open a pull request against `main`.

            ## Architecture
            - API route: `src/app/api/chat/route.ts`
            - AI tools: `src/lib/tools/`
            - Virtual FS: `src/lib/file-system.ts`
            - Preview pipeline: `src/lib/transform/jsx-transformer.ts`
            - UI layout: `src/app/main-content.tsx`
            - Auth: `src/lib/auth.ts` (JWT, httpOnly cookie)
            - DB schema: `prisma/schema.prisma` (SQLite)
          mcp_config: |
            {
              "mcpServers": {
                "playwright": {
                  "command": "npx",
                  "args": [
                    "@playwright/mcp@latest",
                    "--browser", "chromium",
                    "--headless"
                  ]
                }
              }
            }

      # ── Auto PR ──────────────────────────────────────────────────────────
      - name: Create Pull Request if branch has changes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          BRANCH=$(git branch --show-current)
          # Check if branch has commits ahead of main
          AHEAD=$(git rev-list --count origin/main..HEAD 2>/dev/null || echo 0)
          if [ "$AHEAD" -gt 0 ]; then
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "fix: $ISSUE_TITLE (#$ISSUE_NUMBER)" \
              --body "Closes #$ISSUE_NUMBER

Automatically fixed by Claude Code." \
              || echo "PR already exists or creation failed"
          else
            echo "No commits ahead of main, skipping PR creation"
          fi

      # ── Dev server logs (debug) ───────────────────────────────────────────
      - name: Upload Next.js logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nextjs-dev-log
          path: /tmp/nextjs.log
          retention-days: 3
